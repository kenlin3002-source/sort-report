<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序</title>
    <style>
        /* 全局樣式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e1e, #2c2c2c);
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            backdrop-filter: blur(10px);
        }

        /* 標題樣式 */
        h1 {
            color: #00bcd4;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        }

        /* 輸入框樣式 */
        input {
            padding: 10px;
            width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        input::placeholder {
            color: #b0b0b0;
        }

        /* 按鈕樣式 */
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #00bcd4, #0288d1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #0288d1, #00bcd4);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.6);
        }

        /* 結果區域樣式 */
        .result {
            margin-top: 20px;
            text-align: center;
        }

        .result h2 {
            color: #00bcd4;
        }

        .error {
            color: #ff5252;
            margin-top: 10px;
        }

        /* 返回首頁連結樣式 */
        .back-home {
            margin-top: 20px;
            text-decoration: none;
            color: #00bcd4;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .back-home:hover {
            color: #0288d1;
        }
    </style>
</head>
<body>
    <h1>氣泡排序</h1>
    <p>請輸入數字（以逗號分隔，例如：5,3,8,6,2）：</p>
    <input type="text" id="numbers" placeholder="輸入數字">
    <button id="sortButton">排序</button>
    <div class="result">
        <h2>排序結果：</h2>
        <p id="sortedResult"></p>
        <p class="error" id="errorMessage"></p>
    </div>
    <a href="index.html" class="back-home">返回首頁</a>

    <script>
        document.getElementById('sortButton').addEventListener('click', function() {
            const input = document.getElementById('numbers').value;
            const errorMessage = document.getElementById('errorMessage');
            const sortedResult = document.getElementById('sortedResult');

            // 清除之前的錯誤訊息和結果
            errorMessage.textContent = '';
            sortedResult.textContent = '';

            // 驗證輸入
            if (!input) {
                errorMessage.textContent = '請輸入數字！';
                return;
            }

            const numArray = input.split(',').map(num => {
                const parsed = parseFloat(num.trim());
                if (isNaN(parsed)) {
                    errorMessage.textContent = '請確保所有輸入都是有效的數字！';
                    throw new Error('Invalid input');
                }
                return parsed;
            });

            // 氣泡排序演算法
            for (let i = 0; i < numArray.length - 1; i++) {
                for (let j = 0; j < numArray.length - i - 1; j++) {
                    if (numArray[j] > numArray[j + 1]) {
                        // 交換數字
                        const temp = numArray[j];
                        numArray[j] = numArray[j + 1];
                        numArray[j + 1] = temp;
                    }
                }
            }

            // 顯示排序結果
            sortedResult.textContent = numArray.join(', ');
        });
    </script>
</body>
</html>
